name = "travel-planner-worker"
main = "src/index.ts"
compatibility_date = "2026-06-25"

# Secrets (NOT stored here — they are encrypted Worker secrets, set per environment):
#   LIVEBLOCKS_SECRET_KEY  — Liveblocks project secret key (never shipped to the client)
#   TOKEN_SECRET           — HMAC key that signs/verifies capability tokens (the sole
#                            hidden secret; every share link is a token signed with it).
#                            Rotate it to invalidate all outstanding links.
#
# Set them locally for `wrangler dev` via worker/.dev.vars (gitignored), and for a
# deployed Worker with:
#   wrangler secret put LIVEBLOCKS_SECRET_KEY --config worker/wrangler.toml --env production
#   wrangler secret put TOKEN_SECRET          --config worker/wrangler.toml --env production
# Mint the genesis owner link once with:  npx tsx scripts/mint-token.ts <roomId> owner
#
# Plain var:
#   ALLOWED_ORIGIN — CORS allow-list origin. When unset the Worker reflects the
#                    request Origin (fine for local dev). Pin it to your Pages URL
#                    in production (set under [env.production.vars] below).

# The default (top-level) deploy targets <name>.<subdomain>.workers.dev and is used
# for quick test deploys: `npm run deploy:worker` (no --env).
workers_dev = true

# ── KV: trip snapshot history ────────────────────────────────────────────────
# Every Worker-mediated write (owner POST /api/trip and the MCP write_board tool)
# snapshots the room's current trip here first, so a bad edit is revertible.
# `wrangler dev` simulates this locally; deploys need a real namespace:
#   wrangler kv namespace create SNAPSHOTS --config worker/wrangler.toml
# then paste the printed id below (and under [env.production] for prod).
[[kv_namespaces]]
binding = "SNAPSHOTS"
id = "1ac8c7b50e2443a3b48d37ff401bd07b"

# ── Production ──────────────────────────────────────────────────────────────
# Deploy with `npm run deploy:worker:prod` (= `wrangler deploy --env production`).
# This publishes a separate Worker named `travel-planner-worker-production`.
[env.production]
workers_dev = true

# Bind the (separately created) production KV namespace for snapshot history.
[[env.production.kv_namespaces]]
binding = "SNAPSHOTS"
id = "bdadc38e2576411c9b91160631307d7d"

[env.production.vars]
# Lock CORS to the deployed SPA origin so only the Cloudflare Pages app can call
# the Worker. Change this to your actual Pages URL (or custom domain).
ALLOWED_ORIGIN = "https://travel-planner-86b.pages.dev"

# To serve the Worker from your own domain instead of *.workers.dev, attach a
# route (requires the zone to live on your Cloudflare account) and set
# `workers_dev = false` above:
# [[env.production.routes]]
# pattern = "api.example.com/*"
# zone_name = "example.com"
