name: Deploy pull request preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      github.event.action != 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PREVIEW_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_PREVIEW_ACCOUNT_ID }}
      LIVEBLOCKS_STAGING_SECRET_KEY: ${{ secrets.LIVEBLOCKS_STAGING_SECRET_KEY }}
      PREVIEW_WORKER_NAME: travel-planner-pr-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: env -u VITE_WORKER_URL npm run build
      - run: rm dist/_redirects
      - name: Write preview secrets
        run: printf 'LIVEBLOCKS_SECRET_KEY=%s\n' "$LIVEBLOCKS_STAGING_SECRET_KEY" > "$RUNNER_TEMP/preview.env"
      - name: Deploy preview
        run: >-
          npx wrangler deploy --config worker/wrangler.preview.toml
          --name "$PREVIEW_WORKER_NAME"
          --secrets-file "$RUNNER_TEMP/preview.env"
          --message "PR #${{ github.event.pull_request.number }}"
      - name: Publish preview URL
        run: |
          echo "Preview: https://$PREVIEW_WORKER_NAME.vandamm.workers.dev" >> "$GITHUB_STEP_SUMMARY"
      - name: Comment preview URL on pull request
        uses: actions/github-script@v8
        with:
          script: |
            const marker = '<!-- travel-planner-preview -->'
            const body = `${marker}
            ## Preview ready

            [Open the full Worker preview](https://${process.env.PREVIEW_WORKER_NAME}.vandamm.workers.dev)

            This preview includes the API and staging Liveblocks access.`
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

  cleanup:
    if: >-
      github.event.action == 'closed' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_PREVIEW_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_PREVIEW_ACCOUNT_ID }}
      PREVIEW_WORKER_NAME: travel-planner-pr-${{ github.event.pull_request.number }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: >-
          npx wrangler delete "$PREVIEW_WORKER_NAME"
          --config worker/wrangler.preview.toml --force
